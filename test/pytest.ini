[pytest]
addopts = -ra --tb=short
asyncio_mode = auto
markers =
    integration: tests that start a local fake NETCONF-over-SSH server or optional real NETCONF target
    netopeer: optional tests against a real Netopeer2/Sysrepo NETCONF server
    slow: tests that may take longer than the pure unit tests
filterwarnings =
    error::DeprecationWarning
